<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="css/style.css" type="text/css">
    <title>Finstagram</title>

</head>
<body>
    <h1 class="page-title">Finstagram</h1>
    <div class="card">
        <div class="top"></div>
        <div class="profile-pic"></div>

        <div class="bottom">
            <h3>Ducky The TrunkFish <span>3</span></h3>
            <p class="location">Great Barrier Reef</p>

            <div class="stats">
                <div class="stat-item">
                    <h4>80K</h4>
                    <p>Followers</p>
                </div>
                <div class="stat-item">
                    <h4>803K</h4>
                    <p>Likes</p>
                </div>
                <div class="stat-item">
                    <h4>1.5k</h4>
                    <p>Photos</p>
                </div>
            </div>

            <div class="password-section">
                <input type="password" placeholder="Password">
                <button>Enter</button>
            </div>

            <p class="not-my-fish">Thats not my Fish!</p>
        </div>
    </div>
</body>

</html>
